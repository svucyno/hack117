<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guider Dashboard — AgriPredict</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth-guard.js"></script>
    <style>
        .page-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 1rem;
        }

        .problem-card {
            background: rgba(255,255,255,0.8);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
        }

        .problem-card.solved {
            border-left-color: var(--green-mid);
            opacity: 0.7;
        }

        .problem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .problem-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--primary);
            margin: 0;
        }

        .solution-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .solution-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .solution-history {
            margin-top: 1rem;
            background: rgba(255,255,255,0.5);
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SaaS Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">Agri<span>Guider</span></div>
            <nav class="sidebar-nav">
                <a href="/guider.html" class="active">👨‍🌾 Farmer Issues</a>
                <a href="/guider-test.html">📝 View Certification</a>
                <a href="/profile.html">👤 Profile</a>
                <div style="flex:1"></div>
                <!-- Settings restricted to Admins only -->
                <a href="#" onclick="logout(); return false;" style="color:var(--muted)">🚪 Logout</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content fade-in">
            <header class="page-header">
                <h1 id="welcome-heading">Guider Dashboard</h1>
                <p>Monitor real-time problems reported by farmers and provide actionable solutions.</p>
            </header>

            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                    <h2 style="font-family: var(--font-display); color: var(--primary); font-size:1.5rem;">Live Problem Feed</h2>
                    <button class="btn btn-outline" id="refresh-feed-btn">🔄 Refresh Feed</button>
                </div>
                
                <div id="guider-feed-container">
                    <div style="text-align:center; padding: 2rem; opacity:0.6; font-style:italic;">Loading farmer problems...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/guider.js"></script>
    <script src="/js/chat-bot.js?v=4"></script>
    <script src="/js/i18n.js"></script>
</body>
</html>
